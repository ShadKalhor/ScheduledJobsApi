databaseChangeLog:
  - changeSet:
      id: 001-create-coupon-table
      author: shad
      changes:
        - createTable:
            tableName: coupons
            columns:
              - column:
                  name: id
                  type: uniqueidentifier
                  constraints:
                    nullable: false
                    primaryKey: true

              - column:
                  name: code
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: discount
                  type: decimal(10,2)
                  constraints:
                    nullable: false

              - column:
                  name: expiryDateTime
                  type: timestamp
                  constraints:
                    nullable: false

              - column:
                  name: active
                  type: boolean
                  constraints:
                    nullable: false
